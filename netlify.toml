[build]
publish = "public"
command = "npm run project-setup && npm run build"

[build.environment]
HUGO_VERSION = "0.157.0"
GO_VERSION = "1.25.1"
NODE_VERSION = "20"

[context.production.environment]
HUGO_ENV = "production"

[context.deploy-preview]
command = "npm run project-setup && npm run build"

# Security & caching headers
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache static assets aggressively (images, fonts, CSS, JS)
[[headers]]
for = "/images/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/fonts/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.webp"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.woff2"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# HTML pages — short cache so updates propagate quickly
[[headers]]
for = "*.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

# Redirect www to non-www (primary domain)
[[redirects]]
from = "https://www.securetechie.com/*"
to = "https://securetechie.com/:splat"
status = 301
force = true
