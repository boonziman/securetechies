#################### default parameters ############################
# favicon module: https://github.com/gethugothemes/hugo-modules/tree/master/images#favicon-implementation
favicon = "images/favicon.png"
# logo module: https://github.com/gethugothemes/hugo-modules/tree/master/images#logo-implementation
logo = "images/logo.png"
logo_darkmode = "images/logo-darkmode.png"
# use `px` or `x` with logo_width, example: "100px".
# Note: logo_width is not work with .svg file
logo_width = "160px"
logo_height = "32px"
# if logo_webp set false, will not generate WEBP version of logo | default is true
logo_webp = true
# logo text will only show when logo is missing.
logo_text = "Secure Techies"
# navbar fixed to top
navbar_fixed = true
# theme-mode
theme_switcher = true
theme_default = "light" # available options [light/dark/system]
# Main Sections
mainSections = ["blog", "services"]
# contact form action
contact_form_action = "#" # contact form works with [https://airform.io/] or [https://formspree.io]
# google tag manager, see https://developers.google.com/tag-manager/
# TODO: Get your GTM Container ID from https://tagmanager.google.com/ and paste it here
google_tag_manager = "" # example: GTM-XXXXXXX
google_adsense = ""     # example: ca-pub-xxxxxxxxxxxxxxxx
# custom script on header, example: custom_script= "<script>console.log(\"Hello World\")</script>"
custom_script = ""
# copyright
copyright = "© 2026 Secure Techies, LLC. All rights reserved."

# Preloader
# preloader module: https://github.com/gethugothemes/hugo-modules/tree/master/components/preloader
[preloader]
enable = false
preloader = "" # use jpg, png, svg or gif format.

# Navigation button
[navigation_button]
enable = true
label = "Get Free Assessment"
link = "/contact"

# search
# search module: https://github.com/gethugothemes/hugo-modules/tree/master/search
[search]
enable = true
primary_color = "#121212"
include_sections = ["blog", "services", "government", "pages"]
show_image = true
show_description = true
show_tags = true
show_categories = true

# announcement
# announcement module: https://github.com/gethugothemes/hugo-modules/tree/master/components/announcement
[announcement]
enable = false
expire_days = 7
content = ""

# seo meta data for OpenGraph / Twitter Card
# seo module: https://github.com/gethugothemes/hugo-modules/tree/master/seo-tools/basic-seo
[metadata]
keywords = ["managed IT services", "cybersecurity", "IT support Los Angeles", "managed IT Southern California", "cybersecurity services", "cloud solutions", "IT consulting", "network security", "backup disaster recovery", "Woodland Hills IT"]
description = "Expert managed IT services, cybersecurity, cloud solutions, and 24/7 support for businesses in Southern California. Free risk assessment from Secure Techies."
author = "Secure Techies, LLC"
# TODO: If Secure Techies has a Twitter/X account, enter the handle (e.g. "securetechies")
# Leave empty to omit the twitter:creator tag
twitter = ""
image = "images/og-image.png"


# site verifications — IMPORTANT for Google Search Console & Bing Webmaster Tools
# verification module: https://github.com/gethugothemes/hugo-modules/tree/master/seo-tools/site-verifications
# TODO: Get verification codes from:
#   Google Search Console: https://search.google.com/search-console → Add Property → HTML tag method → copy the content value
#   Bing Webmaster Tools:  https://www.bing.com/webmasters → Add Site → HTML meta tag → copy the content value
[site_verification]
google = ""   # TODO: Paste Google Search Console verification code here
bing = ""     # TODO: Paste Bing Webmaster Tools verification code here
baidu = ""    # Your verification code
facebook = "" # Your verification code
mastodon = "" # Your verification code

# cookies
# cookies module: https://github.com/gethugothemes/hugo-modules/tree/master/components/cookie-consent
[cookies]
enable = true
expire_days = 60
content = "This site uses cookies to enhance your experience. By continuing to use this website, you agree to our [Privacy Policy](/privacy-policy)."
button = "I Accept"

# diagrams
[mermaid]
js_url = 'https://cdn.jsdelivr.net/npm/mermaid@latest/dist/mermaid.esm.min.mjs'

######################## sidebar widgets #########################
[widgets]
sidebar = ["categories", "tags"]


# google map
[google_map]
enable = false
map_api_key = ""
map_latitude = "34.1682"
map_longitude = "-118.6058"
map_marker = "images/marker.png"


# Subscription
[subscription]
enable = false
# mailchimp subsciption
mailchimp_form_action = "https://gmail.us4.list-manage.com/subscribe/post?u=463ee871f45d2d93748e77cad&amp;id=a0a2c6d074" # replace this url with yours
mailchimp_form_name = "b_463ee871f45d2d93748e77cad_a0a2c6d074"
